name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - name: Inject Environment Variables
        run: |
          echo "window.env = {" > env.js
          echo "    FIREBASE_API_KEY: \"${{ secrets.FIREBASE_API_KEY }}\"," >> env.js
          echo "    FIREBASE_PROJECT_ID: \"${{ secrets.FIREBASE_PROJECT_ID }}\"," >> env.js
          echo "    FIREBASE_APP_ID: \"${{ secrets.FIREBASE_APP_ID }}\"," >> env.js
          echo "    TEST_USER_ID: \"${{ secrets.TEST_USER_ID }}\"" >> env.js
          echo "};" >> env.js
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GYM_TRACKER_94C3F }}
          projectId: gym-tracker-94c3f
